<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOLO Model Trainer</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="content-area" id="content-area"></main>
  </div>
  <div id="toast-container"></div>
  <div id="modal-root"></div>

  <!-- Namespace bootstrap -->
  <script>
    window.App = window.App || {};
    window.App.components = window.App.components || {};
    window.App.pages = window.App.pages || {};
  </script>

  <!-- Tauri IPC bridge (uses __TAURI_INTERNALS__, no deps) -->
  <script src="js/tauri-bridge.js"></script>

  <!-- Core (no deps) -->
  <script src="js/events.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>

  <!-- Components (no deps or events-only) -->
  <script src="js/components/tooltip.js"></script>
  <script src="js/components/collapsible.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/sidebar.js"></script>

  <!-- Pages (depend on events, api, components) -->
  <script src="js/pages/new-training.js"></script>
  <script src="js/pages/training-history.js"></script>
  <script src="js/pages/inference.js"></script>
  <script src="js/pages/settings.js"></script>

  <!-- Router + Bootstrap -->
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
